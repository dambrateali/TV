<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Painel Power BI Rotativo</title>

  <style>
    html, body { margin:0; height:100%; background:#000; }
    #frame { width:100vw; height:100vh; border:0; display:block; background:#000; }

    /* TIMER MINIMAL (só o tempo) */
    #timer {
      position: fixed;
      left: 14px;
      bottom: 14px;
      z-index: 20;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      font-size: 13px;
      font-weight: 700;
      padding: 6px 8px;
      border-radius: 10px;
      background: rgba(0,0,0,.28);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      line-height: 1;
      min-width: 44px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="timer">--:--</div>

  <iframe
    id="frame"
    allow="fullscreen"
    referrerpolicy="origin-when-cross-origin"
  ></iframe>

  <script>
    const pages = [
      "https://app.fabric.microsoft.com/reportEmbed?reportId=7fe507ac-7f9c-4ebb-ba32-a57788c91279&autoAuth=true&ctid=832b0736-d169-4301-a7d7-a8cc17c4a68f&filterPaneEnabled=false&navContentPaneEnabled=false&aspectRatio=Fill&enablePersistentCookie=true",
      "https://app.fabric.microsoft.com/reportEmbed?reportId=20adb7ad-4c4e-45ac-a497-db45c09fc555&autoAuth=true&ctid=832b0736-d169-4301-a7d7-a8cc17c4a68f&filterPaneEnabled=false&navContentPaneEnabled=false&aspectRatio=Fill&enablePersistentCookie=true"
    ];

    const ROTATE_MS = 5 * 60 * 1000;

    const frame = document.getElementById("frame");
    const timerEl = document.getElementById("timer");

    let idx = 0;
    let next = Date.now() + ROTATE_MS;
    let canRotate = false;

    function fmt(ms){
      const total = Math.max(0, Math.floor(ms / 1000));
      const m = Math.floor(total / 60);
      const s = total % 60;
      return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    }

    function isLoginUrl(url){
      if (!url) return true;
      return (
        url.includes("login") ||
        url.includes("signin") ||
        url.includes("authorize")
      );
    }

    function loadReport(i){
      canRotate = false;
      timerEl.textContent = "--:--"; // enquanto carrega/login, fica neutro
      const url = pages[i] + "&tvts=" + Date.now();
      frame.src = url;
    }

    frame.addEventListener("load", () => {
      let src = "";
      try { src = frame.contentWindow.location.href; } catch(e){}

      // só libera rotação quando NÃO estiver em login
      if (!isLoginUrl(src)) {
        canRotate = true;
        next = Date.now() + ROTATE_MS;
      }
    });

    // inicial
    loadReport(idx);

    // tick 1s: atualiza só o tempo e troca quando chegar
    setInterval(() => {
      const now = Date.now();

      if (canRotate) {
        timerEl.textContent = fmt(next - now);

        if (now >= next) {
          idx = (idx + 1) % pages.length;
          loadReport(idx);
        }
      }
    }, 1000);
  </script>
</body>
</html>
