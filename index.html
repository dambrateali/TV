<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Painel Power BI Rotativo</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .msg { opacity: .9; padding: 24px; text-align: center; max-width: 520px; }
    .small { opacity: .75; font-size: 14px; margin-top: 10px; line-height: 1.35; }
    .btn {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.08);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="msg">
    <div>Rodando painel rotativo…</div>
    <div class="small">
      Se não abrir o relatório, toque em <b>Iniciar</b> (algumas TVs bloqueiam popup sem interação).
      <br/>Depois disso, ele alterna sozinho a cada 5 minutos.
    </div>
    <button id="start" class="btn">Iniciar</button>
  </div>

  <script>
    const pages = [
      "https://app.fabric.microsoft.com/reportEmbed?reportId=7fe507ac-7f9c-4ebb-ba32-a57788c91279&autoAuth=true&ctid=832b0736-d169-4301-a7d7-a8cc17c4a68f&filterPaneEnabled=false&navContentPaneEnabled=false&aspectRatio=Fill",
      "https://app.fabric.microsoft.com/reportEmbed?reportId=20adb7ad-4c4e-45ac-a497-db45c09fc555&autoAuth=true&ctid=832b0736-d169-4301-a7d7-a8cc17c4a68f&filterPaneEnabled=false&navContentPaneEnabled=false&aspectRatio=Fill"
    ];

    const ROTATE_MS = 5 * 60 * 1000;
    const KEY = "tv_rotate_idx_popup";

    let idx = parseInt(localStorage.getItem(KEY) || "0", 10);
    if (!Number.isFinite(idx)) idx = 0;
    idx = idx % pages.length;

    let win = null;

    function openOrFocus() {
      // Abre em nova janela/aba controlada
      if (!win || win.closed) {
        win = window.open("", "TV_PBI_PANEL");
      }
      if (win) {
        win.focus();
      }
      return !!win && !win.closed;
    }

    function go(i) {
      localStorage.setItem(KEY, String(i));
      const url = pages[i] + (pages[i].includes("?") ? "&" : "?") + "ts=" + Date.now();
      win.location.replace(url);
    }

    function startRotation() {
      if (!openOrFocus()) {
        alert("Popup bloqueado. Permita popups para este site e clique em Iniciar de novo.");
        return;
      }

      // Carrega o primeiro imediatamente
      go(idx);

      // Alterna para sempre
      setInterval(() => {
        if (!openOrFocus()) return; // se a janela sumiu, tenta de novo
        idx = (parseInt(localStorage.getItem(KEY) || "0", 10) + 1) % pages.length;
        go(idx);
      }, ROTATE_MS);
    }

    // tenta iniciar automaticamente (em alguns ambientes funciona)
    startRotation();

    // botão para TVs que exigem interação do usuário
    document.getElementById("start").addEventListener("click", startRotation);
  </script>
</body>
</html>
