<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Painel Power BI Rotativo</title>

  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <style>
    html, body { margin:0; height:100%; background:#000; }
    #frame { width:100vw; height:100vh; border:0; display:block; background:#000; }

    /* HUD minimal: só "Troca em" */
    #hud{
      position:fixed; left:14px; bottom:14px;
      z-index:20;
      color:#fff;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      font-size:13px;
      background:rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.14);
      border-radius:10px;
      padding:8px 10px;
      line-height:1.2;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      min-width: 140px;
    }
    #hud b { font-weight: 700; }

    .overlay{
      position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
      background:#000; color:#fff; z-index:10; pointer-events:none;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
    }
    .msg{ opacity:.85; padding:24px; text-align:center; }
    .small{ opacity:.7; font-size:14px; margin-top:8px; line-height:1.35; }
    .hidden{ display:none; }
  </style>
</head>
<body>
  <div id="overlay" class="overlay">
    <div class="msg">
      <div>Carregando relatório…</div>
      <div class="small">Alterna automaticamente a cada 5 minutos.</div>
    </div>
  </div>

  <div id="hud">
    Troca em: <b id="hudCountdown">--:--</b>
  </div>

  <iframe
    id="frame"
    allow="fullscreen"
    referrerpolicy="no-referrer-when-downgrade"
  ></iframe>

  <script>
    /**
     * ✅ CACHE KILLER (TV):
     * força 1 recarregamento com query param novo 1x por dia.
     * Assim você não precisa ficar mudando link manualmente.
     */
    const DAY_KEY = "tv_daily_bust_v1";
    const today = new Date().toISOString().slice(0,10); // YYYY-MM-DD
    if (localStorage.getItem(DAY_KEY) !== today) {
      localStorage.setItem(DAY_KEY, today);
      const url = new URL(window.location.href);
      url.searchParams.set("v", String(Date.now()));
      window.location.replace(url.toString());
    }

    const pages = [
      "https://app.fabric.microsoft.com/reportEmbed?reportId=7fe507ac-7f9c-4ebb-ba32-a57788c91279&autoAuth=true&ctid=832b0736-d169-4301-a7d7-a8cc17c4a68f&filterPaneEnabled=false&navContentPaneEnabled=false&aspectRatio=Fill",
      "https://app.fabric.microsoft.com/reportEmbed?reportId=20adb7ad-4c4e-45ac-a497-db45c09fc555&autoAuth=true&ctid=832b0736-d169-4301-a7d7-a8cc17c4a68f&filterPaneEnabled=false&navContentPaneEnabled=false&aspectRatio=Fill"
    ];

    const ROTATE_MS = 5 * 60 * 1000;

    const KEY_IDX  = "tv_idx_iframe";
    const KEY_NEXT = "tv_next_iframe";

    const frame = document.getElementById("frame");
    const overlay = document.getElementById("overlay");
    const hudCountdown = document.getElementById("hudCountdown");

    function showOverlay(){ overlay.classList.remove("hidden"); }
    function hideOverlay(){ overlay.classList.add("hidden"); }

    frame.addEventListener("load", () => setTimeout(hideOverlay, 500));

    function getIdx(){
      let v = parseInt(localStorage.getItem(KEY_IDX) || "0", 10);
      if (!Number.isFinite(v)) v = 0;
      return ((v % pages.length) + pages.length) % pages.length;
    }
    function setIdx(v){ localStorage.setItem(KEY_IDX, String(v)); }

    function getNext(){
      let v = parseInt(localStorage.getItem(KEY_NEXT) || "0", 10);
      if (!Number.isFinite(v) || v <= 0) v = Date.now() + ROTATE_MS;
      return v;
    }
    function setNext(v){ localStorage.setItem(KEY_NEXT, String(v)); }

    function loadReport(i){
      showOverlay();
      // cache-buster pra forçar troca real no iframe
      const url = pages[i] + (pages[i].includes("?") ? "&" : "?") + "tvts=" + Date.now();
      frame.src = url;
      setIdx(i);
    }

    let idx = getIdx();
    loadReport(idx);

    let next = getNext();
    const now0 = Date.now();
    if (next < now0 + 1000) {
      next = now0 + ROTATE_MS;
      setNext(next);
    }

    function fmtMs(ms){
      const s = Math.max(0, Math.floor(ms / 1000));
      const m = Math.floor(s / 60);
      const r = s % 60;
      return `${String(m).padStart(2,"0")}:${String(r).padStart(2,"0")}`;
    }

    // tick 1s: atualiza HUD + troca quando chegar a hora
    setInterval(() => {
      const now = Date.now();
      hudCountdown.textContent = fmtMs(next - now);

      if (now >= next) {
        idx = (getIdx() + 1) % pages.length;
        loadReport(idx);
        next = now + ROTATE_MS;
        setNext(next);
      }
    }, 1000);
  </script>
</body>
</html>
