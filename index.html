<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Painel Power BI Rotativo</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }
    #frame {
      width: 100vw;
      height: 100vh;
      border: 0;
      display: block;
      background: #000;
    }
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 10;
      pointer-events: none;
    }
    .msg { opacity: .85; padding: 24px; text-align: center; }
    .small { opacity: .7; font-size: 14px; margin-top: 8px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="overlay" class="overlay">
    <div class="msg">
      <div>Carregando relatório…</div>
      <div class="small">Se pedir login, entre uma vez e ele segue alternando.</div>
    </div>
  </div>

  <iframe
    id="frame"
    referrerpolicy="no-referrer-when-downgrade"
    allow="fullscreen"
  ></iframe>

  <script>
    const pages = [
      "https://app.fabric.microsoft.com/reportEmbed?reportId=7fe507ac-7f9c-4ebb-ba32-a57788c91279&autoAuth=true&ctid=832b0736-d169-4301-a7d7-a8cc17c4a68f&filterPaneEnabled=false&navContentPaneEnabled=false&aspectRatio=Fill",
      "https://app.fabric.microsoft.com/reportEmbed?reportId=20adb7ad-4c4e-45ac-a497-db45c09fc555&autoAuth=true&ctid=832b0736-d169-4301-a7d7-a8cc17c4a68f&filterPaneEnabled=false&navContentPaneEnabled=false&aspectRatio=Fill"
    ];

    const ROTATE_MS = 5 * 60 * 1000;

    const KEY = "tv_rotate_idx_v2";
    let idx = parseInt(localStorage.getItem(KEY) || "0", 10);
    if (!Number.isFinite(idx)) idx = 0;
    idx = idx % pages.length;

    const frame = document.getElementById("frame");
    const overlay = document.getElementById("overlay");

    function showOverlay() { overlay.classList.remove("hidden"); }
    function hideOverlay() { overlay.classList.add("hidden"); }

    function loadReport(i) {
      showOverlay();
      frame.src = pages[i] + (pages[i].includes("?") ? "&" : "?") + "ts=" + Date.now();
      localStorage.setItem(KEY, String(i));
    }

    // quando o iframe terminar de carregar, esconde o "Carregando…"
    frame.addEventListener("load", () => {
      // pequeno delay pra evitar “piscar” em carregamentos muito rápidos
      setTimeout(hideOverlay, 500);
    });

    // carrega o primeiro
    loadReport(idx);

    // alterna a cada 5 minutos
    setInterval(() => {
      idx = (idx + 1) % pages.length;
      loadReport(idx);
    }, ROTATE_MS);
  </script>
</body>
</html>
