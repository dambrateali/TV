<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Painel Power BI Rotativo</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .msg { opacity: .85; padding: 24px; text-align: center; }
    .small { opacity: .7; font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="msg">
    <div>Carregando relatório…</div>
    <div class="small">Alterna automaticamente a cada 5 minutos</div>
  </div>

  <script>
    const pages = [
      "https://app.fabric.microsoft.com/reportEmbed?reportId=7fe507ac-7f9c-4ebb-ba32-a57788c91279&autoAuth=true&ctid=832b0736-d169-4301-a7d7-a8cc17c4a68f&filterPaneEnabled=false&navContentPaneEnabled=false&aspectRatio=Fill",
      "https://app.fabric.microsoft.com/reportEmbed?reportId=20adb7ad-4c4e-45ac-a497-db45c09fc555&autoAuth=true&ctid=832b0736-d169-4301-a7d7-a8cc17c4a68f&filterPaneEnabled=false&navContentPaneEnabled=false&aspectRatio=Fill"
    ];

    const ROTATE_MS = 5 * 60 * 1000;

    const KEY_IDX  = "tv_idx";
    const KEY_TIME = "tv_next_switch";

    const now = Date.now();

    let idx  = parseInt(localStorage.getItem(KEY_IDX)  || "0", 10);
    let next = parseInt(localStorage.getItem(KEY_TIME) || "0", 10);

    if (!Number.isFinite(idx)) idx = 0;

    // Se já passou do horário, troca
    if (now >= next) {
      idx = (idx + 1) % pages.length;
      localStorage.setItem(KEY_IDX, idx);
      localStorage.setItem(KEY_TIME, now + ROTATE_MS);
    }

    // WATCHDOG: força reload total em 5 minutos (TV friendly)
    setTimeout(() => {
      window.location.href =
        window.location.origin +
        window.location.pathname +
        "?reload=" + Date.now();
    }, ROTATE_MS);

    // Abre o relatório (TOP LEVEL, sem iframe)
    window.location.replace(pages[idx]);
  </script>
</body>
</html>
