<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Painel Power BI Rotativo</title>

  <!-- ajuda a reduzir cache em alguns navegadores/TVs -->
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <style>
    html, body { margin:0; height:100%; background:#000; }
    #frame { width:100vw; height:100vh; border:0; display:block; background:#000; }

    /* HUD (info no canto) */
    #hud{
      position:fixed; left:14px; bottom:14px;
      z-index:20;
      color:#fff;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      font-size:14px;
      background:rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.18);
      border-radius:12px;
      padding:10px 12px;
      line-height:1.35;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      min-width: 230px;
    }
    #hud b { font-weight: 700; }

    .overlay{
      position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
      background:#000; color:#fff; z-index:10; pointer-events:none;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
    }
    .msg{ opacity:.85; padding:24px; text-align:center; }
    .small{ opacity:.7; font-size:14px; margin-top:8px; line-height:1.35; }
    .hidden{ display:none; }
  </style>
</head>
<body>
  <div id="overlay" class="overlay">
    <div class="msg">
      <div>Carregando relatório…</div>
      <div class="small">Alterna automaticamente a cada 5 minutos.</div>
    </div>
  </div>

  <div id="hud">
    <div>Relatório: <b id="hudReport">-</b></div>
    <div>Troca em: <b id="hudCountdown">-</b></div>
    <div>Agora: <b id="hudNow">-</b></div>
    <div style="opacity:.75">Versão: <b id="hudVer">-</b></div>
  </div>

  <iframe
    id="frame"
    allow="fullscreen"
    referrerpolicy="no-referrer-when-downgrade"
  ></iframe>

  <script>
    const pages = [
      "https://app.fabric.microsoft.com/reportEmbed?reportId=7fe507ac-7f9c-4ebb-ba32-a57788c91279&autoAuth=true&ctid=832b0736-d169-4301-a7d7-a8cc17c4a68f&filterPaneEnabled=false&navContentPaneEnabled=false&aspectRatio=Fill",
      "https://app.fabric.microsoft.com/reportEmbed?reportId=20adb7ad-4c4e-45ac-a497-db45c09fc555&autoAuth=true&ctid=832b0736-d169-4301-a7d7-a8cc17c4a68f&filterPaneEnabled=false&navContentPaneEnabled=false&aspectRatio=Fill"
    ];

    const ROTATE_MS = 5 * 60 * 1000;

    const KEY_IDX  = "tv_idx_iframe";
    const KEY_NEXT = "tv_next_iframe";

    const frame = document.getElementById("frame");
    const overlay = document.getElementById("overlay");

    const hudReport = document.getElementById("hudReport");
    const hudCountdown = document.getElementById("hudCountdown");
    const hudNow = document.getElementById("hudNow");
    const hudVer = document.getElementById("hudVer");

    // mostra a versão (query param v=)
    const params = new URLSearchParams(location.search);
    hudVer.textContent = params.get("v") || "sem-v";

    function showOverlay(){ overlay.classList.remove("hidden"); }
    function hideOverlay(){ overlay.classList.add("hidden"); }

    frame.addEventListener("load", () => setTimeout(hideOverlay, 500));

    function getIdx(){
      let v = parseInt(localStorage.getItem(KEY_IDX) || "0", 10);
      if (!Number.isFinite(v)) v = 0;
      return ((v % pages.length) + pages.length) % pages.length;
    }
    function setIdx(v){ localStorage.setItem(KEY_IDX, String(v)); }

    function getNext(){
      let v = parseInt(localStorage.getItem(KEY_NEXT) || "0", 10);
      if (!Number.isFinite(v) || v <= 0) v = Date.now() + ROTATE_MS;
      return v;
    }
    function setNext(v){ localStorage.setItem(KEY_NEXT, String(v)); }

    function loadReport(i){
      showOverlay();
      hudReport.textContent = `${i + 1}/${pages.length}`;
      const url = pages[i] + (pages[i].includes("?") ? "&" : "?") + "tvts=" + Date.now();
      frame.src = url;
      setIdx(i);
    }

    // start
    let idx = getIdx();
    loadReport(idx);

    let next = getNext();
    const now0 = Date.now();
    if (next < now0 + 1000) {
      next = now0 + ROTATE_MS;
      setNext(next);
    }

    function fmtMs(ms){
      const s = Math.max(0, Math.floor(ms / 1000));
      const m = Math.floor(s / 60);
      const r = s % 60;
      return `${String(m).padStart(2,"0")}:${String(r).padStart(2,"0")}`;
    }

    // tick 1s: atualiza HUD + troca quando chega a hora
    setInterval(() => {
      const now = Date.now();

      // relógio na tela
      const d = new Date(now);
      const hh = String(d.getHours()).padStart(2,"0");
      const mm = String(d.getMinutes()).padStart(2,"0");
      const ss = String(d.getSeconds()).padStart(2,"0");
      hudNow.textContent = `${hh}:${mm}:${ss}`;

      // contagem regressiva
      hudCountdown.textContent = fmtMs(next - now);

      if (now >= next) {
        idx = (getIdx() + 1) % pages.length;
        loadReport(idx);
        next = now + ROTATE_MS;
        setNext(next);
      }
    }, 1000);
  </script>
</body>
</html>
