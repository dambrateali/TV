<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Painel Power BI Rotativo</title>
  <style>
    html, body { margin:0; height:100%; background:#000; }
    #frame { width:100vw; height:100vh; border:0; display:block; background:#000; }
    .overlay{
      position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
      background:#000; color:#fff; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      z-index:10; pointer-events:none;
    }
    .msg{ opacity:.85; padding:24px; text-align:center; }
    .small{ opacity:.7; font-size:14px; margin-top:8px; }
    .hidden{ display:none; }
  </style>
</head>
<body>
  <div id="overlay" class="overlay">
    <div class="msg">
      <div>Carregando relatório…</div>
      <div class="small">Ele alterna automaticamente a cada 5 minutos.</div>
    </div>
  </div>

  <iframe id="frame" allow="fullscreen"></iframe>

  <script>
    const pages = [
      "https://app.fabric.microsoft.com/reportEmbed?reportId=7fe507ac-7f9c-4ebb-ba32-a57788c91279&autoAuth=true&ctid=832b0736-d169-4301-a7d7-a8cc17c4a68f&filterPaneEnabled=false&navContentPaneEnabled=false&aspectRatio=Fill",
      "https://app.fabric.microsoft.com/reportEmbed?reportId=20adb7ad-4c4e-45ac-a497-db45c09fc555&autoAuth=true&ctid=832b0736-d169-4301-a7d7-a8cc17c4a68f&filterPaneEnabled=false&navContentPaneEnabled=false&aspectRatio=Fill"
    ];

    const ROTATE_MS = 5 * 60 * 1000;

    const KEY_IDX  = "tv_rotate_idx_v3";
    const KEY_NEXT = "tv_rotate_next_v3";

    const frame = document.getElementById("frame");
    const overlay = document.getElementById("overlay");

    function showOverlay(){ overlay.classList.remove("hidden"); }
    function hideOverlay(){ overlay.classList.add("hidden"); }

    frame.addEventListener("load", () => setTimeout(hideOverlay, 400));

    function getIdx(){
      let idx = parseInt(localStorage.getItem(KEY_IDX) || "0", 10);
      if (!Number.isFinite(idx)) idx = 0;
      return ((idx % pages.length) + pages.length) % pages.length;
    }

    function setIdx(idx){
      localStorage.setItem(KEY_IDX, String(idx));
    }

    function getNext(){
      let next = parseInt(localStorage.getItem(KEY_NEXT) || "0", 10);
      if (!Number.isFinite(next) || next <= 0) next = Date.now() + ROTATE_MS;
      return next;
    }

    function setNext(ts){
      localStorage.setItem(KEY_NEXT, String(ts));
    }

    function loadReport(idx){
      showOverlay();
      // cache-buster pra garantir que a troca "pega"
      const url = pages[idx] + (pages[idx].includes("?") ? "&" : "?") + "ts=" + Date.now();
      frame.src = url;
      setIdx(idx);
    }

    // Inicial
    let idx = getIdx();
    loadReport(idx);

    // Agenda próxima troca (persistente)
    let nextSwitch = getNext();
    if (nextSwitch < Date.now() + 1000) {
      nextSwitch = Date.now() + ROTATE_MS;
      setNext(nextSwitch);
    }

    // “Relógio” (robusto contra timers atrasados)
    setInterval(() => {
      const now = Date.now();
      if (now >= nextSwitch) {
        idx = (getIdx() + 1) % pages.length;
        loadReport(idx);

        // garante próxima troca exata a cada 5min a partir de agora
        nextSwitch = now + ROTATE_MS;
        setNext(nextSwitch);
      }
    }, 1000);

    // Se a aba voltar do “sleep”, ele confere e troca se já passou da hora
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        const now = Date.now();
        nextSwitch = getNext();
        if (now >= nextSwitch) {
          idx = (getIdx() + 1) % pages.length;
          loadReport(idx);
          nextSwitch = now + ROTATE_MS;
          setNext(nextSwitch);
        }
      }
    });
  </script>
</body>
</html>
