<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Painel Power BI Rotativo</title>

  <style>
    html, body { margin:0; height:100%; background:#000; }
    #frame { width:100vw; height:100vh; border:0; display:block; background:#000; }

    #hud{
      position:fixed; left:14px; bottom:14px;
      z-index:20;
      color:#fff;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      font-size:13px;
      background:rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.14);
      border-radius:10px;
      padding:8px 10px;
    }

    .overlay{
      position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
      background:#000; color:#fff; z-index:10; pointer-events:none;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
    }
    .hidden{ display:none; }
  </style>
</head>
<body>

  <div id="overlay" class="overlay">
    <div>Carregando relatório…</div>
  </div>

  <div id="hud">
    Troca em: <b id="hudCountdown">--:--</b>
  </div>

  <iframe
    id="frame"
    allow="fullscreen"
    referrerpolicy="origin-when-cross-origin"
  ></iframe>

  <script>
    const pages = [
      "https://app.fabric.microsoft.com/reportEmbed?reportId=7fe507ac-7f9c-4ebb-ba32-a57788c91279&autoAuth=true&ctid=832b0736-d169-4301-a7d7-a8cc17c4a68f&filterPaneEnabled=false&navContentPaneEnabled=false&aspectRatio=Fill&enablePersistentCookie=true",
      "https://app.fabric.microsoft.com/reportEmbed?reportId=20adb7ad-4c4e-45ac-a497-db45c09fc555&autoAuth=true&ctid=832b0736-d169-4301-a7d7-a8cc17c4a68f&filterPaneEnabled=false&navContentPaneEnabled=false&aspectRatio=Fill&enablePersistentCookie=true"
    ];

    const ROTATE_MS = 5 * 60 * 1000;
    const frame = document.getElementById("frame");
    const hud = document.getElementById("hudCountdown");
    const overlay = document.getElementById("overlay");

    let idx = 0;
    let next = Date.now() + ROTATE_MS;
    let canRotate = false;

    function fmt(ms){
      const s = Math.max(0, Math.floor(ms/1000));
      return String(Math.floor(s/60)).padStart(2,"0") + ":" + String(s%60).padStart(2,"0");
    }

    function isLoginUrl(url){
      if (!url) return true;
      return (
        url.includes("login") ||
        url.includes("signin") ||
        url.includes("authorize")
      );
    }

    function loadReport(i){
      overlay.classList.remove("hidden");
      canRotate = false;

      const url = pages[i] + "&tvts=" + Date.now();
      frame.src = url;
    }

    frame.addEventListener("load", () => {
      let src = "";
      try { src = frame.contentWindow.location.href; } catch(e){}

      if (!isLoginUrl(src)) {
        // relatório carregado de verdade
        canRotate = true;
        next = Date.now() + ROTATE_MS;
        overlay.classList.add("hidden");
      }
    });

    // inicial
    loadReport(idx);

    setInterval(() => {
      hud.textContent = fmt(next - Date.now());

      if (canRotate && Date.now() >= next) {
        idx = (idx + 1) % pages.length;
        loadReport(idx);
      }
    }, 1000);
  </script>
</body>
</html>
